<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aura Battle — Password Reset</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #E8192C;
    --red-dim: #9b1020;
    --black: #0a0a0a;
    --surface: #111111;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #888;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: \'Barlow\', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%; padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  header img { height: 36px; width: auto; object-fit: contain; }
  .logo-fallback {
    width: 48px; height: 32px; background: var(--red);
    display: flex; align-items: center; justify-content: center;
    clip-path: polygon(0 0,100% 0,100% 75%,88% 100%,0 100%);
    flex-shrink: 0;
  }
  .logo-fallback span {
    font-family: \'Bebas Neue\', sans-serif;
    font-size: 13px; color: #fff; letter-spacing: 1px;
  }

  main {
    width: 100%; max-width: 420px;
    padding: 40px 24px 60px;
    animation: fadeUp .4s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .eyebrow {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--red); margin-bottom: 8px;
  }
  h1 {
    font-family: \'Bebas Neue\', sans-serif;
    font-size: clamp(34px, 9vw, 48px);
    line-height: .95; margin-bottom: 16px;
  }
  h1 span { color: var(--red); }

  /* ── highlighted instruction box ── */
  .info-box {
    background: #1a0d0d;
    border: 1px solid var(--red);
    border-left: 4px solid var(--red);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 28px;
  }
  .info-box p {
    font-size: 14px; color: #f0f0f0; line-height: 1.7; margin: 0;
  }
  .info-box strong { color: var(--red); }

  .field { margin-bottom: 20px; }
  label {
    display: block; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 7px;
  }
  input[type=text] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: \'Barlow\', sans-serif;
    font-size: 16px;
    padding: 14px 16px;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  input[type=text]:focus { border-color: var(--red); }
  input::placeholder { color: #444; }

  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

  .btn {
    width: 100%; padding: 15px;
    background: var(--red);
    border: none; border-radius: 4px;
    color: #fff;
    font-family: \'Bebas Neue\', sans-serif;
    font-size: 18px; letter-spacing: 2px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    margin-top: 4px;
  }
  .btn:hover   { background: #ff2236; }
  .btn:active  { transform: scale(.98); }
  .btn:disabled { background: var(--red-dim); cursor: not-allowed; }

  .msg {
    margin-top: 18px; padding: 14px 16px;
    border-radius: 4px; font-size: 14px;
    line-height: 1.6; display: none;
  }
  .msg.success { background:#0d2b1a; border:1px solid #1a5c34; color:#4cde8a; }
  .msg.error   { background:#2b0d0d; border:1px solid #5c1a1a; color:#ff6b6b; }
  .msg.show    { display:block; animation:fadeUp .3s ease; }

  .spinner {
    width:17px; height:17px;
    border:2px solid rgba(255,255,255,.3);
    border-top-color:#fff; border-radius:50%;
    animation:spin .7s linear infinite;
    display:inline-block; vertical-align:middle; margin-right:8px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  footer {
    margin-top:auto; padding:24px;
    font-size:12px; color:#333; text-align:center;
  }
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Aura Battle"
       onerror="this.style.display=\'none\';document.getElementById(\'logoFallback\').style.display=\'flex\'"/>
  <div class="logo-fallback" id="logoFallback" style="display:none"><span>AB</span></div>
</header>

<main>
  <p class="eyebrow">Account Security</p>
  <h1>RESET YOUR<br/><span>PASSWORD</span></h1>

  

  <form id="resetForm" autocomplete="off">
    <div class="field">
      <label for="identifier"> Email / User ID</label>
      <input type="text" id="identifier"
             placeholder="Enter email or User ID"
             autocomplete="off"
             autocorrect="off"
             spellcheck="false"/>
      <p class="hint">Enter your email (e.g. john@gmail.com) or User ID (e.g. ABC123).</p>
    </div>
    <button type="submit" class="btn" id="submitBtn">SEND RESET LINK</button>
  </form>

  <div class="msg" id="statusMsg"></div>
</main>

<footer>© 2025 Aura Battle. All rights reserved.</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3lYVV6jEIdoBLmG94gBnqgYn28Bz-w7ALbuXZUm9bOue42CDRNuUM9iWQVNw0jmu8BA/exec";
const SITE_URL        = "https://resetpassword-aurabattle.netlify.app";
const SECRET          = "aura_battle_reset_2025";

firebase.initializeApp({
  apiKey: "AIzaSyD7pAsdYqkJzDbSsi8xbLsy2X5s0bgP040",
  authDomain: "aura-battle-main.firebaseapp.com",
  databaseURL: "https://aura-battle-main-default-rtdb.firebaseio.com",
  projectId: "aura-battle-main",
  storageBucket: "aura-battle-main.firebasestorage.app",
  messagingSenderId: "763779990289",
  appId: "1:763779990289:web:5caa7bc861e80b6f0b02b0"
});
const db = firebase.database();

// Auto-uppercase for User IDs only (not emails)
document.getElementById("identifier").addEventListener("input", function() {
  if (!this.value.includes("@")) {
    var pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
  }
});

// Find user by userId (direct) or email (scan all users)
async function findUser(raw) {
  var val   = raw.trim();
  var upper = val.toUpperCase();

  // User ID: no @ means it is a user ID, do a direct lookup
  if (!val.includes("@")) {
    var snap = await db.ref("users").child(upper).get();
    if (!snap.exists()) return null;
    var d = snap.val();
    if (!d.email) return { error: "no_email" };
    return { userId: upper, email: d.email, name: d.name || "" };
  }

  // Email: scan all users and compare
  var snap2 = await db.ref("users").get();
  if (!snap2.exists()) return null;
  var all = snap2.val();
  for (var uid in all) {
    var u = all[uid];
    if (u.email && u.email.toLowerCase() === val.toLowerCase()) {
      return { userId: uid, email: u.email, name: u.name || "" };
    }
  }
  return null;
}

// Generate HMAC token (no database needed)
async function generateToken(userId, email) {
  var payload = userId + ":" + email + ":" + Date.now();
  var b64     = btoa(payload);
  var key     = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(SECRET),
    { name: "HMAC", hash: "SHA-256" }, false, ["sign"]
  );
  var sig    = await crypto.subtle.sign("HMAC", key, new TextEncoder().encode(b64));
  var sigHex = Array.from(new Uint8Array(sig)).map(function(b) {
    return b.toString(16).padStart(2, "0");
  }).join("");
  return b64.replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_") + "." + sigHex;
}

function showMsg(text, type) {
  var el = document.getElementById("statusMsg");
  el.innerHTML = text;
  el.className = "msg " + type + " show";
}

function resetBtn() {
  var btn = document.getElementById("submitBtn");
  btn.disabled = false;
  btn.textContent = "SEND RESET LINK";
}

document.getElementById("resetForm").addEventListener("submit", function(e) {
  e.preventDefault();

  var raw = document.getElementById("identifier").value.trim();
  if (!raw) {
    showMsg("Please enter your email address or User ID.", "error");
    return;
  }

  var btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = "<span class=\"spinner\"></span>SEARCHING...";

  findUser(raw).then(function(user) {

    if (!user) {
      showMsg("No account found. Please check your details and try again.", "error");
      resetBtn(); return;
    }
    if (user.error === "no_email") {
      showMsg("This account has no email linked. Please contact support.", "error");
      resetBtn(); return;
    }

    btn.innerHTML = "<span class=\"spinner\"></span>SENDING EMAIL...";

    return generateToken(user.userId, user.email).then(function(token) {
      var resetUrl = SITE_URL + "/reset.html?t=" + token;

      return fetch(APPS_SCRIPT_URL, {
        method:  "POST",
        mode:    "no-cors",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ to: user.email, name: user.name, resetUrl: resetUrl })
      }).then(function() {
        var masked = user.email.replace(/(.{2}).+(@.+)/, "$1****$2");
        showMsg("Reset link sent to <strong>" + masked + "</strong>.<br/>Check your inbox and spam folder.", "success");
        resetBtn();
      });
    });

  }).catch(function(err) {
    console.error("Error:", err);
    showMsg("Error: " + (err.message || "Something went wrong. Please try again."), "error");
    resetBtn();
  });
});
</script>
</body>
</html>
